<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Card shape: warm linen background -->
  <rect x="4" y="3" width="24" height="26" rx="4" ry="4" fill="#F5F0E8" stroke="#E8E0D4" stroke-width="1.5"/>
  <!-- Copper accent left edge -->
  <rect x="4" y="3" width="4" height="26" rx="4" ry="4" fill="#C17832"/>
  <rect x="6" y="3" width="2" height="26" fill="#C17832"/>
  <!-- Recipe lines -->
  <line x1="12" y1="10" x2="24" y2="10" stroke="#8C7E6A" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="12" y1="15" x2="22" y2="15" stroke="#D4C9B8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="12" y1="20" x2="23" y2="20" stroke="#D4C9B8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="12" y1="25" x2="20" y2="25" stroke="#D4C9B8" stroke-width="1.5" stroke-linecap="round"/>
</svg>
